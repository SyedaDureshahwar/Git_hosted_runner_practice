<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Actions CI Demo</title>
</head>
<body>
    <header>
        <h1>Welcome to My CI Demo Website</h1>
    </header>

    <main>
        <p>This is a simple HTML page used for testing a GitHub Actions CI pipeline.</p>

        <h2>Features</h2>
        <ul>
            <li>GitHub Actions Workflow</li>
            <li>GitHub Hosted Runner</li>
            <li>HTML Validation</li>
            <li>Continuous Integration (CI)</li>
        </ul>

        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </main>

    <footer>
        <p>&copy; 2026 CI Demo Project</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").innerText =
                "GitHub Actions CI is working!";
        }
    </script>
</body>
</html>
